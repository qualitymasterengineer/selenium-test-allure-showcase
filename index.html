<script id="custom-selenium-executor-patch">
(function() {
  var targetText = "Selenium Framework";
  var className = "custom-selenium-logo";
  function findIconCellForSeleniumRow() {
    var walker = document.createTreeWalker(document.body, NodeFilter.SHOW_TEXT, null, false);
    var node;
    while ((node = walker.nextNode())) {
      var text = (node.textContent || "").trim();
      if (text.indexOf(targetText) === -1) continue;
      var el = node.parentElement;
      while (el && el !== document.body) {
        var icon = el.querySelector("[class*=\"executor-icon\"], [class*=\"icon\"]");
        if (icon) {
          var iconParent = icon.parentElement;
          if (iconParent && !iconParent.classList.contains(className)) {
            icon.style.setProperty("display", "none", "important");
            iconParent.classList.add(className);
            return true;
          }
          return false;
        }
        var prev = el.previousElementSibling;
        if (prev) {
          var iconInPrev = prev.querySelector("[class*=\"icon\"]");
          if (iconInPrev && !prev.classList.contains(className)) {
            iconInPrev.style.setProperty("display", "none", "important");
            prev.classList.add(className);
            return true;
          }
        }
        el = el.parentElement;
      }
    }
    return false;
  }
  function run() {
    findIconCellForSeleniumRow();
    var attempts = 0;
    var id = setInterval(function() {
      attempts++;
      if (findIconCellForSeleniumRow() || attempts >= 30) clearInterval(id);
    }, 200);
  }
  var debounceTimer;
  function reapplyOnDomChange() {
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(findIconCellForSeleniumRow, 150);
  }
  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", function() {
      run();
      if (typeof MutationObserver !== "undefined") {
        var obs = new MutationObserver(reapplyOnDomChange);
        obs.observe(document.body, { childList: true, subtree: true });
      }
    });
  } else {
    setTimeout(function() {
      run();
      if (typeof MutationObserver !== "undefined") {
        var obs = new MutationObserver(reapplyOnDomChange);
        obs.observe(document.body, { childList: true, subtree: true });
      }
    }, 100);
  }
})();
</script>
